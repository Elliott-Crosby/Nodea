<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Nodea — Live MVP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header class="header">
  <div class="brand">
    <span class="logo">⟁</span>
    <h1>Nodea</h1>
  </div>
  <div class="header-actions">
    <button id="btnSearch" class="btn-icon" type="button" aria-label="Search workspace" title="Search workspace">🔍</button>
    <button id="btnQuickExport" class="btn-icon" type="button" aria-label="Export workspace" title="Export workspace">↗</button>
    <div class="overflow-menu">
      <button id="btnOverflow" class="btn-icon" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="menuOverflow" title="More actions">⋯</button>
      <div id="menuOverflow" class="menu-panel hidden" role="menu" aria-hidden="true">
        <button class="menu-item" type="button" data-action="key" role="menuitem">
          <span class="menu-label">Key Set</span>
          <span id="keyChip" class="menu-meta muted">Missing</span>
        </button>
        <button class="menu-item" type="button" data-action="import" role="menuitem">Import</button>
        <div class="menu-group" role="none">
          <div class="menu-heading" role="presentation">Export</div>
          <button class="menu-item" type="button" data-action="export-download" role="menuitem">Download .nodea.json</button>
          <button class="menu-item" type="button" data-action="export-copy" role="menuitem">Copy JSON to clipboard</button>
        </div>
        <button class="menu-item" type="button" data-action="center" role="menuitem">Center / Fit</button>
        <button class="menu-item" type="button" data-action="context" role="menuitem">
          <span class="menu-label">Context Panel</span>
          <span id="contextStatus" class="menu-meta">Off</span>
        </button>
        <button class="menu-item" type="button" data-action="settings" role="menuitem">Settings</button>
        <button class="menu-item" type="button" data-action="zen" role="menuitem">
          <span class="menu-icon" aria-hidden="true">👁</span>
          <span class="menu-label">Zen Mode</span>
          <span id="zenStatus" class="menu-meta">Off</span>
        </button>
        <button class="menu-item danger" type="button" data-action="clear" role="menuitem">Clear Board</button>
      </div>
    </div>
  </div>
  <input id="fileImport" type="file" accept="application/json" hidden />
</header>

  <main>
    <!-- Canvas (viewport). We pan/zoom this by transforming the inner #stage -->
    <div id="canvas" class="canvas" aria-label="Canvas">
      <div id="stage" class="stage">
        <div id="gridLayer" class="grid-layer" aria-hidden="true"></div>
        <svg id="edgesLayer" class="edges" xmlns="http://www.w3.org/2000/svg"></svg>
        <!-- Nodes will be injected here -->
      </div>
    </div>
    <button id="btnNewPrompt" class="fab">＋ New Prompt</button>
  </main>

  <!-- Settings Modal -->
  <div id="modalSettings" class="modal hidden" aria-hidden="true" role="dialog" aria-label="Settings">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="icon-btn" data-close-settings>✕</button>
      </div>
      <div class="modal-body">
        <label class="label">OpenAI API key</label>
        <input id="inpKey" class="input" type="password" placeholder="sk-..." autocomplete="off" />
        <p class="help">Stored only in your browser. Sent in the Authorization header to your Nodea API.</p>

        <label class="label">Default Model</label>
        <input id="inpModel" class="input" type="text" value="gpt-4o-mini" />
      </div>
      <div class="modal-footer">
        <button id="btnSaveKey" class="btn">Save</button>
        <button id="btnClearKey" class="btn danger">Clear</button>
      </div>
    </div>
  </div>

  <!-- Context Drawer -->
  <aside id="drawerContext" class="drawer hidden" aria-hidden="true" aria-label="Context Preview">
    <div class="drawer-header">
      <h2>Context Preview</h2>
      <button class="icon-btn" data-close-context>✕</button>
    </div>
    <div class="drawer-body">
      <div class="row"><span class="muted">Messages to send:</span> <span id="ctxCount" class="chip">0</span></div>
      <ul id="ctxList" class="ctx-list"></ul>
      <p class="muted small">Lineage only. Oldest items trimmed if long.</p>
    </div>
  </aside>

  <!-- Clear Workspace Confirm -->
  <div id="modalClear" class="modal hidden" aria-hidden="true" role="dialog" aria-label="Confirm clear">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Clear workspace?</h2>
        <button class="icon-btn" data-close-clear>✕</button>
      </div>
      <div class="modal-body">
        <p>This removes all nodes and links. Export first if you want a copy.</p>
      </div>
      <div class="modal-footer">
        <button id="btnCancelClear" class="btn secondary">Cancel</button>
        <button id="btnConfirmClear" class="btn danger">Yes, clear</button>
      </div>
    </div>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
