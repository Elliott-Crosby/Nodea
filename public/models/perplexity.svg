<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 14 14" fill="none">
  <rect width="14" height="14" rx="3" fill="#1A1A1A"/>
  <!-- 6-pointed asterisk: 3 lines crossing at center -->
  <g transform="translate(7,7)" stroke="#20C997" stroke-width="1.3" stroke-linecap="round">
    <line x1="0" y1="-5.5" x2="0"    y2="5.5"/>
    <line x1="0" y1="-5.5" x2="0"    y2="5.5" transform="rotate(60)"/>
    <line x1="0" y1="-5.5" x2="0"    y2="5.5" transform="rotate(120)"/>
  </g>
</svg>
