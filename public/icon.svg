<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9b72f8"/>
      <stop offset="1" stop-color="#6525c8"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#g)"/>
  <!-- stem -->
  <line x1="16" y1="12" x2="16" y2="17" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- fork left -->
  <line x1="16" y1="17" x2="10.5" y2="21.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- fork right -->
  <line x1="16" y1="17" x2="21.5" y2="21.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- root node -->
  <circle cx="16" cy="9.5" r="2.75" fill="white"/>
  <!-- left branch node -->
  <circle cx="10.5" cy="24" r="2.75" fill="white" fill-opacity="0.82"/>
  <!-- right branch node -->
  <circle cx="21.5" cy="24" r="2.75" fill="white" fill-opacity="0.82"/>
</svg>
